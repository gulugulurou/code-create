spring:
  # 加载 对应 application-local.yml 文件配置内容
  profiles:
    active: local
#  session 配置
  session:
    store-type: redis
#    session 30 天过期
    timeout: 2592000

  application:
    name: yu-ai-code-mother-backend

  # redis
  data:
    redis:
      host: localhost
      port: 6379
      password:
      ttl: 3600

  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/yu_ai_code_mother
    username: root
    password: root

server:
  port: 8123
  servlet:
    context-path: /api
#    cookie 30 天过期
    session:
      cookie:
        max-age: 2592000


# knife4j 配置参数
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.wanan.yuaicodemother.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
