spring:
  application:
    name: yu-ai-code-mother-backend

  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/yu_ai_code_mother
    username: root
    password: root

server:
  port: 8123
  servlet:
    context-path: /api



# knife4j 配置参数
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.wanan.yuaicodemother.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
